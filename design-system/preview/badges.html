<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Badges & chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);display:flex;flex-direction:column;gap:16px;}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.lbl{font:500 10px/1 "IBM Plex Sans";text-transform:uppercase;letter-spacing:.08em;color:#64748B;width:96px;}
.chip{font:500 12px/1 "IBM Plex Sans";padding:6px 10px;border-radius:4px;border:1px solid #E2E8F0;color:#122560;background:#fff;}
.chip.cert{font-family:"IBM Plex Mono";letter-spacing:.04em;}
.chip.success{background:#DCFCE7;color:#15803D;border-color:transparent;}
.chip.warn{background:#FEF3C7;color:#B45309;border-color:transparent;}
.chip.error{background:#FEE2E2;color:#B91C1C;border-color:transparent;}
.chip.dark{background:#0F1629;color:#fff;border-color:transparent;}
.dot{width:6px;height:6px;border-radius:9999px;display:inline-block;margin-right:6px;vertical-align:middle;}
</style></head><body>
<div class="row"><span class="lbl">Cert</span>
  <span class="chip cert">SOC 2 Type II</span>
  <span class="chip cert">HIPAA</span>
  <span class="chip cert">ISO 27001</span>
  <span class="chip cert">GDPR</span>
</div>
<div class="row"><span class="lbl">Status</span>
  <span class="chip success"><span class="dot" style="background:#15803D"></span>Operational</span>
  <span class="chip warn"><span class="dot" style="background:#B45309"></span>Degraded</span>
  <span class="chip error"><span class="dot" style="background:#B91C1C"></span>P1 incident</span>
  <span class="chip dark">LeoRix AI</span>
</div>
</body></html>
