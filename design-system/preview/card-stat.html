<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Stat card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:#fff;font-family:var(--font-body);}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;}
.stat .num{font:700 44px/1.05 "DM Sans";letter-spacing:-0.02em;color:#122560;}
.stat .unit{font:400 22px/1 "DM Sans";color:#122560;}
.stat .lbl{font:500 11px/1 "IBM Plex Sans";text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-top:8px;display:block;}
.stat .cap{font:400 12px/1.4 "IBM Plex Sans";color:#64748B;margin-top:6px;display:block;}
</style></head><body>
<div class="row">
  <div class="stat"><span class="num">2.8<span class="unit">M</span></span><span class="lbl">Alerts triaged</span><span class="cap">2025 · across 42 engagements</span></div>
  <div class="stat"><span class="num">64<span class="unit">%</span></span><span class="lbl">MTTR reduction</span><span class="cap">P1–P3, healthcare client</span></div>
  <div class="stat"><span class="num">11<span class="unit">k</span></span><span class="lbl">Engineer-hours back</span><span class="cap">Annualized, mid-market avg</span></div>
  <div class="stat"><span class="num">4</span><span class="lbl">Compliance regimes</span><span class="cap">SOC 2 · HIPAA · ISO 27001 · GDPR</span></div>
</div>
</body></html>
