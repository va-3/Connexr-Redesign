<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Brand colors — primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .swatch{border-radius:8px;border:1px solid var(--border);overflow:hidden;}
  .chip{height:84px;}
  .meta{padding:10px 12px;display:flex;justify-content:space-between;align-items:baseline;}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--fg-strong);}
  .hex{font-family:var(--font-mono);font-size:12px;color:var(--fg-subtle);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#122560"></div><div class="meta"><span class="name">navy-900</span><span class="hex">#122560</span></div></div>
  <div class="swatch"><div class="chip" style="background:#0F1629"></div><div class="meta"><span class="name">navy-950</span><span class="hex">#0F1629</span></div></div>
  <div class="swatch"><div class="chip" style="background:#F27A1A"></div><div class="meta"><span class="name">orange-500</span><span class="hex">#F27A1A</span></div></div>
</div>
</body></html>
