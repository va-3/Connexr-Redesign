<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .swatch{border-radius:6px;border:1px solid var(--border);overflow:hidden;}
  .chip{height:64px;}
  .meta{padding:6px 8px;}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--fg-strong);display:block;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border)"></div><div class="meta"><span class="name">white</span><span class="hex">#FFFFFF</span></div></div>
  <div class="swatch"><div class="chip" style="background:#F8FAFC"></div><div class="meta"><span class="name">bg-50</span><span class="hex">#F8FAFC</span></div></div>
  <div class="swatch"><div class="chip" style="background:#F1F5F9"></div><div class="meta"><span class="name">slate-100</span><span class="hex">#F1F5F9</span></div></div>
  <div class="swatch"><div class="chip" style="background:#E2E8F0"></div><div class="meta"><span class="name">slate-200</span><span class="hex">#E2E8F0</span></div></div>
  <div class="swatch"><div class="chip" style="background:#CBD5E1"></div><div class="meta"><span class="name">slate-300</span><span class="hex">#CBD5E1</span></div></div>
  <div class="swatch"><div class="chip" style="background:#94A3B8"></div><div class="meta"><span class="name">slate-400</span><span class="hex">#94A3B8</span></div></div>
  <div class="swatch"><div class="chip" style="background:#64748B"></div><div class="meta"><span class="name">slate-500</span><span class="hex">#64748B</span></div></div>
  <div class="swatch"><div class="chip" style="background:#475569"></div><div class="meta"><span class="name">slate-600</span><span class="hex">#475569</span></div></div>
  <div class="swatch"><div class="chip" style="background:#334155"></div><div class="meta"><span class="name">slate-700</span><span class="hex">#334155</span></div></div>
  <div class="swatch"><div class="chip" style="background:#1B3284"></div><div class="meta"><span class="name">navy-800</span><span class="hex">#1B3284</span></div></div>
  <div class="swatch"><div class="chip" style="background:#122560"></div><div class="meta"><span class="name">navy-900</span><span class="hex">#122560</span></div></div>
  <div class="swatch"><div class="chip" style="background:#0F1629"></div><div class="meta"><span class="name">navy-950</span><span class="hex">#0F1629</span></div></div>
</div>
</body></html>
