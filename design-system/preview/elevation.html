<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:32px;background:#F8FAFC;font-family:var(--font-body);}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:20px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-strong);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);}
.sm{box-shadow:0 1px 2px rgba(18,37,96,0.05);}
.md{box-shadow:0 8px 24px rgba(18,37,96,0.06);}
.lg{box-shadow:0 20px 48px rgba(18,37,96,0.10);}
</style></head><body>
<div class="row">
  <div class="card sm"><span class="lbl">shadow-sm</span><span class="spec">0 1 2 / navy 5%</span></div>
  <div class="card md"><span class="lbl">shadow-md</span><span class="spec">0 8 24 / navy 6%</span></div>
  <div class="card lg"><span class="lbl">shadow-lg</span><span class="spec">0 20 48 / navy 10%</span></div>
</div>
</body></html>
