<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
label{display:block;font:500 12px/1 "IBM Plex Sans";text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px;}
.input{width:100%;box-sizing:border-box;font:400 14px/1.4 "IBM Plex Sans";color:#0F1629;border:1px solid #E2E8F0;border-radius:4px;padding:10px 12px;background:#fff;}
.input.focus{outline:none;border-color:#122560;box-shadow:0 0 0 2px #F27A1A;}
.input.error{border-color:#B91C1C;}
.help{font:400 12px/1.4 "IBM Plex Sans";color:#64748B;margin-top:4px;}
.help.err{color:#B91C1C;}
</style></head><body>
<div class="grid">
  <div><label>Work email</label><input class="input" value="cto@acme.health" /><div class="help">SOC 2 + HIPAA-eligible domains only.</div></div>
  <div><label>Work email · focus</label><input class="input focus" value="cto@acme.health" /><div class="help">2px orange ring on focus-visible.</div></div>
  <div><label>Region</label><select class="input"><option>US-East · Virginia</option></select></div>
  <div><label>Region · error</label><input class="input error" value="lon-1" /><div class="help err">Region not supported on starter plan.</div></div>
</div>
</body></html>
