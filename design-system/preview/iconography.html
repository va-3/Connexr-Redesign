<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<style>body{margin:0;padding:24px;background:#fff;font-family:"IBM Plex Sans";}
.row{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;align-items:end;justify-items:center;}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
.lbl{font:400 9px/1 "IBM Plex Mono";color:#64748B;}
svg{stroke:#122560;stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.head{font:500 11px/1 "IBM Plex Sans";text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:12px;display:block;}
</style></head><body>
<span class="head">Lucide · 1.5px stroke · 24px · navy / currentColor</span>
<div class="row">
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><span class="lbl">activity</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg><span class="lbl">check-circle</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><path d="M12 9v4M12 17h.01"/></svg><span class="lbl">alert-triangle</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><path d="m21 4-9 9-3-3"/></svg><span class="lbl">shield-check</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><path d="M7 6h2M15 6h2M7 18h2M15 18h2M6 8v8M18 8v8"/></svg><span class="lbl">network</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg><span class="lbl">runbook</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><path d="m18 16 4-4-4-4M6 8l-4 4 4 4M14.5 4l-5 16"/></svg><span class="lbl">code</span></div>
  <div class="cell"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg><span class="lbl">trending</span></div>
</div>
</body></html>
