<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo lock-ups</title>
<style>body{margin:0;padding:0;font-family:"IBM Plex Sans";display:grid;grid-template-columns:1fr 1fr;}
.cell{padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;min-height:140px;}
.light{background:#fff;border-right:1px solid #E2E8F0;}
.dark{background:#0F1629;}
img{max-width:80%;max-height:64px;object-fit:contain;}
.lbl{font-size:11px;font-family:"IBM Plex Mono";color:#64748B;}
.lbl.dark{color:rgba(255,255,255,.6);}
</style></head><body>
<div class="cell light"><img src="../assets/connexr-logo.png" /><span class="lbl">connexr-logo.png · default</span></div>
<div class="cell dark"><img src="../assets/connexr-logo-white.png" /><span class="lbl dark">connexr-logo-white.png · on navy-950</span></div>
</body></html>
