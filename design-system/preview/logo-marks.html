<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Logo marks</title>
<style>body{margin:0;padding:24px;background:#fff;font-family:"IBM Plex Sans";display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:center;justify-items:center;}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
img{object-fit:contain;}
.lbl{font:400 10px/1 "IBM Plex Mono";color:#64748B;}
.tile{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:center;}
</style></head><body>
<div class="cell"><div class="tile" style="width:96px;height:96px"><img src="../assets/connexr-mark.png" style="width:64px;height:64px"/></div><span class="lbl">mark · favicon / avatar</span></div>
<div class="cell"><div class="tile" style="width:200px;height:96px"><img src="../assets/connexr-wordmark.png" style="height:36px"/></div><span class="lbl">wordmark only</span></div>
<div class="cell"><div class="tile" style="background:#0F1629;width:200px;height:96px"><img src="../assets/connexr-logo-white.png" style="height:36px"/></div><span class="lbl">on navy-950</span></div>
</body></html>
