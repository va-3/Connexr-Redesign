<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;background:#F8FAFC;font-family:var(--font-body);}
.nav{height:64px;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;padding:0 32px;}
.left{display:flex;align-items:center;gap:32px;}
.logo{height:28px;}
.links{display:flex;gap:24px;}
.links a{font:400 14px/1 "IBM Plex Sans";color:#0F1629;}
.cta{font:500 14px/1 "IBM Plex Sans";background:#F27A1A;color:#fff;padding:10px 20px;border-radius:8px;border:0;cursor:pointer;}
.cap{padding:18px 32px;font:400 12px/1 "IBM Plex Mono";color:#64748B;}
</style></head><body>
<div class="nav">
  <div class="left">
    <img class="logo" src="../assets/connexr-logo.png" alt="Connexr" />
    <nav class="links">
      <a>Services</a><a>Products</a><a>Industries</a><a>Insights</a><a>Company</a>
    </nav>
  </div>
  <button class="cta">Book a demo</button>
</div>
<div class="cap">64px sticky · 1px slate-200 border · white 92% + blur(8px) once scrolled</div>
</body></html>
