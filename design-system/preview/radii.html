<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-body);}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.c{display:flex;flex-direction:column;align-items:center;gap:8px;}
.box{width:96px;height:96px;background:#122560;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-strong);}
.use{font-family:var(--font-body);font-size:11px;color:var(--fg-subtle);}
</style></head><body>
<div class="row">
  <div class="c"><div class="box" style="border-radius:0"></div><span class="lbl">0</span><span class="use">editorial</span></div>
  <div class="c"><div class="box" style="border-radius:4px"></div><span class="lbl">4px</span><span class="use">inputs · chips</span></div>
  <div class="c"><div class="box" style="border-radius:8px"></div><span class="lbl">8px · default</span><span class="use">cards · buttons</span></div>
  <div class="c"><div class="box" style="border-radius:12px"></div><span class="lbl">12px</span><span class="use">hero panels</span></div>
</div>
</body></html>
