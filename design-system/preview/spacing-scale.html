<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-mono);font-size:11px;}
.row{display:flex;align-items:center;gap:12px;padding:4px 0;}
.bar{background:#122560;height:14px;}
.tok{width:36px;color:var(--fg-subtle);text-align:right;}
.px{color:var(--fg-strong);width:48px;}
</style></head><body>
<div class="row"><span class="tok">1</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="tok">2</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="tok">3</span><span class="px">12px</span><span class="bar" style="width:12px"></span></div>
<div class="row"><span class="tok">4</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="tok">6</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="tok">8</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="tok">12</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
<div class="row"><span class="tok">16</span><span class="px">64px</span><span class="bar" style="width:64px"></span></div>
<div class="row"><span class="tok">24</span><span class="px">96px</span><span class="bar" style="width:96px"></span></div>
<div class="row"><span class="tok">32</span><span class="px">128px</span><span class="bar" style="width:128px"></span></div>
<div class="row"><span class="tok">40</span><span class="px">160px</span><span class="bar" style="width:160px"></span></div>
</body></html>
