<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type — body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;}
.spec{display:grid;grid-template-columns:90px 1fr;gap:16px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);}
.tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);}
.h3{font:700 28px/1.15 "DM Sans";color:var(--navy-900);}
.h4{font:600 22px/1.2 "DM Sans";color:var(--navy-900);}
.lead{font:400 18px/1.55 "IBM Plex Sans";color:var(--navy-950);}
.body{font:400 16px/1.55 "IBM Plex Sans";color:var(--navy-950);}
.small{font:400 14px/1.55 "IBM Plex Sans";color:var(--slate-600);}
.eyebrow{font:500 12px/1.2 "IBM Plex Sans";text-transform:uppercase;letter-spacing:0.08em;color:var(--slate-500);}
</style></head><body>
<div class="spec"><span class="tag">32 / h3</span><span class="h3">Managed AIOps execution</span></div>
<div class="spec"><span class="tag">24 / h4</span><span class="h4">Triage at machine speed</span></div>
<div class="spec"><span class="tag">18 / lead</span><span class="lead">We run AI-native operations for enterprise IT — eliminating alert fatigue.</span></div>
<div class="spec"><span class="tag">16 / body</span><span class="body">42 enterprise engagements, 2.8M alerts triaged in 2025.</span></div>
<div class="spec"><span class="tag">14 / small</span><span class="small">SOC 2 Type II · HIPAA · ISO 27001 · GDPR</span></div>
<div class="spec"><span class="tag">12 / eyebrow</span><span class="eyebrow">Methodology</span></div>
</body></html>
