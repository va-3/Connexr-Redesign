<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:#fff;}
.spec{display:grid;grid-template-columns:80px 1fr;gap:16px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);}
.tag{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);}
.s96{font:700 64px/1.05 "DM Sans";letter-spacing:-0.025em;color:var(--navy-900);}
.s72{font:700 56px/1.05 "DM Sans";letter-spacing:-0.025em;color:var(--navy-900);}
.s48{font:700 40px/1.1 "DM Sans";letter-spacing:-0.02em;color:var(--navy-900);}
</style></head><body>
<div class="spec"><span class="tag">96 / display</span><span class="s96">Scale at speed</span></div>
<div class="spec"><span class="tag">72 / h1</span><span class="s72">AI at the core.</span></div>
<div class="spec"><span class="tag">48 / h2</span><span class="s48">Run AIOps in production.</span></div>
</body></html>
